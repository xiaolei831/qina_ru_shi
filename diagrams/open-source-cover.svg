    <ellipse cx="66" cy="55" rx="52" ry="28" fill="#111827"/>
    <ellipse cx="66" cy="51" rx="39" ry="18" fill="#2f3a48"/>
    <circle cx="66" cy="51" r="8" fill="#74d1ff"/>
    <text x="130" y="49" class="label">2D 激光雷达</text>
    <text x="130" y="79" class="small">建图 / 定位 / 避障感知</text>
  </g>

  <g transform="translate(116,632)" filter="url(#softShadow)">
    <rect width="316" height="126" rx="22" class="card"/>
    <rect x="30" y="34" width="92" height="42" rx="20" fill="#1f2937"/>
    <circle cx="54" cy="55" r="10" fill="#6ee7b7"/>
    <circle cx="77" cy="55" r="10" fill="#60a5fa"/>
    <circle cx="100" cy="55" r="10" fill="#a78bfa"/>
    <text x="140" y="49" class="label">Astra RGB-D</text>
    <text x="140" y="79" class="small">图像采集 / 药品识别</text>
  </g>

  <g transform="translate(1162,292)" filter="url(#softShadow)">
    <rect width="318" height="126" rx="22" class="card"/>
    <path d="M68 82h94a32 32 0 0 0 5-64 42 42 0 0 0-80-5 34 34 0 0 0-44 33 34 34 0 0 0 25 36Z" fill="#e9f6ff" stroke="#2d6cdf" stroke-width="6"/>
    <text x="184" y="49" class="label">OneNET / Web</text>
    <text x="184" y="79" class="small">记录上传 · 状态监控</text>
  </g>

  <g transform="translate(1162,462)" filter="url(#softShadow)">
    <rect width="318" height="126" rx="22" class="card"/>
    <rect x="34" y="34" width="92" height="58" rx="10" fill="#0e7a5f"/>
    <rect x="46" y="46" width="28" height="22" rx="4" fill="#b8f7e7"/>
    <rect x="83" y="46" width="28" height="22" rx="4" fill="#b8f7e7"/>
    <path d="M46 86H112M80 28V98" stroke="#d6fff5" stroke-width="4"/>
    <text x="152" y="49" class="label">STM32 下位机</text>
    <text x="152" y="79" class="small">底盘 / 电机 / 夹爪控制</text>
  </g>

  <g transform="translate(1162,632)" filter="url(#softShadow)">
    <rect width="318" height="126" rx="22" class="card"/>
    <path d="M70 92C96 66 105 44 104 23" fill="none" stroke="#1f2937" stroke-width="18" stroke-linecap="round"/>
    <path d="M105 25C132 42 144 62 152 92" fill="none" stroke="#1f2937" stroke-width="16" stroke-linecap="round"/>
    <rect x="42" y="90" width="140" height="14" rx="7" fill="url(#orange)"/>
    <circle cx="70" cy="92" r="12" fill="#ffcf5a"/>
    <circle cx="105" cy="25" r="12" fill="#ffcf5a"/>
    <circle cx="152" cy="92" r="12" fill="#ffcf5a"/>
    <text x="196" y="49" class="label">六轴机械臂</text>
    <text x="196" y="79" class="small">药品抓取 · 放置执行</text>
  </g>

  <g transform="translate(598,664)" filter="url(#softShadow)">
    <rect width="404" height="128" rx="26" class="card"/>
    <rect x="82" y="58" width="185" height="40" rx="16" fill="#263547"/>
    <rect x="112" y="25" width="150" height="44" rx="10" fill="#f7fafc" stroke="#cad8e2" stroke-width="3"/>
    <circle cx="112" cy="104" r="22" fill="#172033"/>
    <circle cx="238" cy="104" r="22" fill="#172033"/>
    <circle cx="112" cy="104" r="8" fill="#94a3b8"/>
    <circle cx="238" cy="104" r="8" fill="#94a3b8"/>
    <rect x="283" y="40" width="40" height="54" rx="12" fill="#eaf2f8"/>
    <text x="52" y="37" class="label">四驱底盘</text>
    <text x="52" y="62" class="small">里程计 / IMU / 电机反馈</text>
  </g>

  <path d="M434 355C490 355 520 360 586 370" class="wireBlue"/>
  <path d="M434 525C506 525 523 492 586 452" class="wireGreen"/>
  <path d="M434 695C504 682 522 604 586 532" class="wireGreen"/>
  <path d="M1006 362C1060 358 1094 352 1154 352" class="wireBlue"/>
  <path d="M1006 474C1054 506 1094 523 1154 524" class="wireOrange"/>
  <path d="M1006 550C1074 606 1098 662 1154 694" class="wireOrange"/>
  <path d="M800 592V656" class="wireGreen dash"/>
  <path d="M940 724C1014 724 1068 714 1154 694" class="wireGreen dash"/>

  <g transform="translate(500,818)">
    <circle cx="0" cy="0" r="6" fill="#2d6cdf"/><text x="16" y="6" class="micro">任务指令 / 状态数据</text>
    <circle cx="214" cy="0" r="6" fill="#16a36f"/><text x="230" y="6" class="micro">感知输入 / 运动反馈</text>
    <circle cx="430" cy="0" r="6" fill="#ef6c35"/><text x="446" y="6" class="micro">机械臂与夹爪控制</text>
  </g>
</svg>
